<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MathCore AI — Smart Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04080f;
    --surface: rgba(8, 18, 35, 0.92);
    --border: rgba(0, 200, 255, 0.18);
    --accent: #00d4ff;
    --accent2: #0077b6;
    --text: #cce8ff;
    --dim: rgba(0, 200, 255, 0.4);
    --glow: 0 0 20px rgba(0, 212, 255, 0.35);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
    background-size: 44px 44px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridDrift {
    from { background-position: 0 0; }
    to { background-position: 44px 44px; }
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,180,255,0.012) 3px,
      rgba(0,180,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Top glow */
  .top-glow {
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 320px;
    background: radial-gradient(ellipse, rgba(0,130,255,0.14) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ── HEADER ── */
  header {
    padding: 22px 0 14px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    animation: fadeDown 0.6s ease;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 4px;
  }

  .logo-hex {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: var(--glow);
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 5px;
    color: var(--accent);
    text-shadow: 0 0 24px rgba(0,212,255,0.6);
  }

  .subtitle {
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--dim);
    margin-top: 2px;
  }

  .caps-row {
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,180,255,0.35);
  }

  /* ── CHAT ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px 4px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 4px; }

  /* Empty state */
  #empty-state {
    text-align: center;
    padding: 30px 0 24px;
    animation: fadeUp 0.5s ease;
  }

  .empty-icon {
    font-size: 42px;
    opacity: 0.25;
    margin-bottom: 12px;
  }

  .empty-text {
    color: var(--dim);
    font-size: 12px;
    margin-bottom: 22px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .chip {
    background: rgba(0,100,200,0.1);
    border: 1px solid rgba(0,180,255,0.18);
    color: rgba(0,212,255,0.65);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    transition: all 0.2s;
  }
  .chip:hover {
    background: rgba(0,150,255,0.2);
    border-color: rgba(0,212,255,0.5);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(0,200,255,0.15);
  }

  /* Messages */
  .msg-row {
    display: flex;
    margin-bottom: 16px;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { justify-content: flex-end; }
  .msg-row.ai   { justify-content: flex-start; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    margin-right: 10px;
    box-shadow: 0 0 10px rgba(0,180,255,0.4);
  }

  .avatar.user {
    background: linear-gradient(135deg, #4cc9f0, #0077b6);
    margin-left: 10px;
    box-shadow: 0 0 10px rgba(0,150,255,0.3);
  }

  .bubble {
    max-width: 82%;
    padding: 11px 15px;
    font-size: 13px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble.user {
    background: linear-gradient(135deg, #0077b6, #023e8a);
    border-radius: 18px 18px 4px 18px;
    color: #e0f4ff;
    box-shadow: 0 4px 18px rgba(0,100,200,0.3);
  }

  .bubble.ai {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  /* Graph canvas wrapper */
  .graph-wrap {
    margin-top: 14px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(0,200,255,0.2);
    box-shadow: 0 0 18px rgba(0,180,255,0.08);
  }

  .graph-wrap canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  /* Typing dots */
  .typing-row { display: flex; margin-bottom: 16px; animation: fadeUp 0.3s ease; }

  .typing-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    padding: 14px 18px;
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.30s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.85); }
    50%       { opacity: 1;   transform: scale(1.1); }
  }

  /* ── INPUT AREA ── */
  #input-area {
    padding: 10px 0 20px;
  }

  .input-box {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: rgba(8, 20, 42, 0.96);
    border: 1px solid rgba(0,180,255,0.28);
    border-radius: 14px;
    padding: 10px 12px;
    box-shadow: 0 0 28px rgba(0,100,255,0.08), inset 0 1px 0 rgba(0,180,255,0.08);
    transition: border-color 0.2s;
  }
  .input-box:focus-within {
    border-color: rgba(0,212,255,0.5);
    box-shadow: 0 0 28px rgba(0,180,255,0.15);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e0f4ff;
    font-size: 13px;
    font-family: 'Share Tech Mono', monospace;
    resize: none;
    line-height: 1.6;
    max-height: 120px;
    overflow-y: auto;
    caret-color: var(--accent);
  }

  #user-input::placeholder { color: rgba(0,180,255,0.3); }

  #send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 14px rgba(0,150,255,0.4);
  }

  #send-btn:hover { transform: scale(1.06); box-shadow: 0 0 20px rgba(0,212,255,0.5); }
  #send-btn:disabled {
    background: rgba(0,100,180,0.2);
    color: rgba(0,180,255,0.25);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  .hint {
    text-align: center;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(0,150,255,0.22);
    margin-top: 7px;
  }

  /* Spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="top-glow"></div>

<div id="app">
  <header>
    <div class="logo-row">
      <div class="logo-hex">∑</div>
      <div>
        <h1>MATHCORE</h1>
        <div class="subtitle">AI CALCULATOR · v2.0</div>
      </div>
    </div>
    <div class="caps-row">CALCULUS &nbsp;·&nbsp; ALGEBRA &nbsp;·&nbsp; TRIGONOMETRY &nbsp;·&nbsp; EQUATIONS &nbsp;·&nbsp; GRAPHS</div>
  </header>

  <div id="chat">
    <div id="empty-state">
      <div class="empty-icon">⬡</div>
      <div class="empty-text">Enter any math problem to begin</div>
      <div class="chips" id="chips"></div>
    </div>
  </div>

  <div id="input-area">
    <div class="input-box">
      <textarea id="user-input" rows="1" placeholder="Enter equation, integral, trig function..."></textarea>
      <button id="send-btn" title="Solve">&#8593;</button>
    </div>
    <div class="hint">ENTER TO SOLVE &nbsp;·&nbsp; SHIFT+ENTER FOR NEWLINE</div>
  </div>
</div>

<script>
const SUGGESTIONS = [
  "∫ x² dx", "d/dx of x³ − 2x", "sin(45°) + cos(30°)",
  "Solve x² − 5x + 6 = 0", "Graph y = sin(x)",
  "tan(π/4) × 2", "Area under y=x² from 0 to 3",
  "Simplify (x²−1)/(x−1)", "Graph y = x³ − 3x"
];

const SYSTEM = `You are MathCore, an advanced AI math engine. Solve any math problem — calculus, algebra, trigonometry, equations, graphs, statistics.

RESPONSE FORMAT (always follow exactly):
- Start with ✦ SOLUTION section with the final answer clearly stated
- Then ▸ STEPS section with numbered clean steps
- If graphable, end with a 📈 GRAPH section containing ONLY a raw JSON object (no markdown fences) like:
{"graphable":true,"expression":"x*x - 4","xMin":-5,"xMax":5,"label":"f(x) = x² − 4"}
  expression must use JavaScript math syntax: use * for multiply, ** for power, Math.sin(), Math.cos(), Math.tan(), Math.PI, Math.sqrt(), Math.abs(), Math.log()
- If NOT graphable, do NOT include the GRAPH section
- Use Unicode math symbols (∫ √ π θ ∞ ² ³)
- For trig, clarify if degrees or radians`;

let history = [];
let loading = false;

// Build suggestion chips
const chipsEl = document.getElementById('chips');
SUGGESTIONS.forEach(s => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = s;
  btn.onclick = () => send(s);
  chipsEl.appendChild(btn);
});

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const emptyState = document.getElementById('empty-state');

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', () => send());

function scrollBottom() {
  setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 50);
}

function appendMessage(role, text, graphData) {
  if (emptyState.parentNode) emptyState.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'ai' ? '⬡' : '◈';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;

  if (role === 'ai' && graphData) {
    const wrap = document.createElement('div');
    wrap.className = 'graph-wrap';
    const canvas = document.createElement('canvas');
    canvas.width = 480;
    canvas.height = 220;
    wrap.appendChild(canvas);
    bubble.appendChild(wrap);
    requestAnimationFrame(() => drawGraph(canvas, graphData));
  }

  if (role === 'ai') {
    row.appendChild(av);
    row.appendChild(bubble);
  } else {
    row.appendChild(bubble);
    row.appendChild(av);
  }

  chatEl.appendChild(row);
  scrollBottom();
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typing';

  const av = document.createElement('div');
  av.className = 'avatar ai';
  av.textContent = '⬡';

  const bub = document.createElement('div');
  bub.className = 'typing-bubble';
  bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  row.appendChild(av);
  row.appendChild(bub);
  chatEl.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setLoading(val) {
  loading = val;
  sendBtn.disabled = val;
  if (val) {
    sendBtn.innerHTML = '<div class="spinner"></div>';
    showTyping();
  } else {
    sendBtn.innerHTML = '&#8593;';
    hideTyping();
  }
}

function parseGraphData(text) {
  const match = text.match(/📈 GRAPH section[\s\S]*?(\{[\s\S]*?"graphable"[\s\S]*?\})/);
  if (!match) return null;
  try {
    const data = JSON.parse(match[1]);
    return data.graphable ? data : null;
  } catch { return null; }
}

function cleanText(text) {
  return text.replace(/📈 GRAPH section[\s\S]*/, '').trim();
}

async function send(preset) {
  const query = (preset || inputEl.value).trim();
  if (!query || loading) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  appendMessage('user', query);
  setLoading(true);

  history.push({ role: 'user', content: query });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    const reply = (data.content || []).map(b => b.text || '').join('');
    const graphData = parseGraphData(reply);
    const clean = cleanText(reply);

    setLoading(false);
    appendMessage('ai', clean, graphData);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    setLoading(false);
    appendMessage('ai', '⚠ Network error. Please try again.');
  }

  inputEl.focus();
}

// ── Canvas Graphing Engine ──
function drawGraph(canvas, gd) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  ctx.fillStyle = '#04080f';
  ctx.fillRect(0, 0, W, H);

  const xMin = gd.xMin ?? -10;
  const xMax = gd.xMax ?? 10;
  const yPad = 6;

  // Evaluate to find yMin/yMax
  const steps = 600;
  const dx = (xMax - xMin) / steps;
  const ys = [];
  for (let i = 0; i <= steps; i++) {
    const v = evalExpr(gd.expression, xMin + i * dx);
    if (isFinite(v)) ys.push(v);
  }
  let yMin = Math.min(...ys) - yPad;
  let yMax = Math.max(...ys) + yPad;
  if (!isFinite(yMin) || !isFinite(yMax)) { yMin = -10; yMax = 10; }
  if (yMax - yMin < 0.001) { yMin -= 5; yMax += 5; }

  const toX = x => ((x - xMin) / (xMax - xMin)) * W;
  const toY = y => H - ((y - yMin) / (yMax - yMin)) * H;

  // Grid
  ctx.strokeStyle = 'rgba(0,200,255,0.06)';
  ctx.lineWidth = 1;
  const xStep = niceStep(xMax - xMin, 8);
  const yStep = niceStep(yMax - yMin, 6);

  for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
    ctx.beginPath(); ctx.moveTo(toX(x), 0); ctx.lineTo(toX(x), H); ctx.stroke();
  }
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
    ctx.beginPath(); ctx.moveTo(0, toY(y)); ctx.lineTo(W, toY(y)); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = 'rgba(0,200,255,0.32)';
  ctx.lineWidth = 1.5;
  if (xMin < 0 && xMax > 0) {
    ctx.beginPath(); ctx.moveTo(toX(0), 0); ctx.lineTo(toX(0), H); ctx.stroke();
  }
  if (yMin < 0 && yMax > 0) {
    ctx.beginPath(); ctx.moveTo(0, toY(0)); ctx.lineTo(W, toY(0)); ctx.stroke();
  }

  // Axis tick labels
  ctx.fillStyle = 'rgba(0,200,255,0.4)';
  ctx.font = '10px "Share Tech Mono", monospace';
  ctx.textAlign = 'center';
  const axisY = yMin < 0 && yMax > 0 ? toY(0) : H - 6;
  for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax; x += xStep) {
    if (Math.abs(x) < xStep * 0.1) continue;
    ctx.fillText(+x.toFixed(2), toX(x), Math.min(axisY + 14, H - 3));
  }
  ctx.textAlign = 'right';
  const axisX = xMin < 0 && xMax > 0 ? toX(0) : 36;
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax; y += yStep) {
    if (Math.abs(y) < yStep * 0.1) continue;
    ctx.fillText(+y.toFixed(2), Math.min(axisX - 4, W - 4), toY(y) + 4);
  }

  // Glow pass
  ctx.save();
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 14;
  ctx.strokeStyle = 'rgba(0,180,255,0.28)';
  ctx.lineWidth = 6;
  traceCurve(ctx, gd.expression, xMin, xMax, steps, toX, toY, yMin, yMax);
  ctx.restore();

  // Main curve
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2.2;
  traceCurve(ctx, gd.expression, xMin, xMax, steps, toX, toY, yMin, yMax);

  // Label
  ctx.fillStyle = 'rgba(0,212,255,0.65)';
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.textAlign = 'left';
  ctx.fillText(gd.label || gd.expression, 8, 18);
}

function traceCurve(ctx, expr, xMin, xMax, steps, toX, toY, yMin, yMax) {
  const dx = (xMax - xMin) / steps;
  ctx.beginPath();
  let started = false;
  let prevY = null;
  for (let i = 0; i <= steps; i++) {
    const x = xMin + i * dx;
    const y = evalExpr(expr, x);
    if (!isFinite(y)) { started = false; prevY = null; continue; }
    const clipped = Math.max(yMin, Math.min(yMax, y));
    const cy = toY(clipped);
    const cx = toX(x);
    // Break line on discontinuities (asymptotes)
    if (prevY !== null && Math.abs(y - prevY) > (yMax - yMin) * 0.6) {
      started = false;
    }
    if (!started) { ctx.moveTo(cx, cy); started = true; }
    else ctx.lineTo(cx, cy);
    prevY = y;
  }
  ctx.stroke();
}

function evalExpr(expr, x) {
  try {
    // Safety: allow only math
    const safe = expr
      .replace(/\^/g, '**')
      .replace(/\bpi\b/g, 'Math.PI')
      .replace(/\be\b/g, 'Math.E');
    // eslint-disable-next-line no-new-func
    return Function('x', 'Math', `"use strict"; return (${safe})`)(x, Math);
  } catch { return NaN; }
}

function niceStep(range, maxTicks) {
  const raw = range / maxTicks;
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const m = raw / pow;
  if (m <= 1) return pow;
  if (m <= 2) return 2 * pow;
  if (m <= 5) return 5 * pow;
  return 10 * pow;
}
</script>
</body>
</html>
